<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card de produtos</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white rounded-xl shadow-lg p-6 max-w-sm hover:shadow-xl transition">

    <img 
      src="images/phone-screen-with-abstract-marble-aesthetic.jpg"
      class="w-full h-48 object-cover rounded-lg mb-4"
      alt="smartphone"
    >

    <h2 class="text-xl font-bold text-gray-800 mb-2">
      Smartphone Pro
    </h2>

    <p class="text-gray-600 mb-4">
      Smartphone moderno com câmera de alta resolução e desempenho rápido.
    </p>

    <div class="flex items-center justify-between">
      <span class="text-lg font-semibold text-blue-600">
        R$ 2.499,00
      </span>

      <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-800 transition">
        Compre agora
      </button>
    </div>

  </div>

</body>
</html>
